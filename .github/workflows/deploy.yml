name: Deploy

on:
  push:
    branches: [main]

env:
  SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes
  DEPLOY_DIR: /opt/wai-telegram

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Sync code to server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.next' \
            --exclude '*.pyc' \
            --exclude 'code/' \
            --exclude '.DS_Store' \
            --exclude '.env.production' \
            --exclude '.env' \
            ./ ${USER}@${HOST}:${DEPLOY_DIR}/

      - name: Start Docker services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          cd /opt/wai-telegram
          set -a && source .env.production && set +a
          docker-compose -f docker-compose.prod.yml up -d
          EOF

      - name: Wait for PostgreSQL
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          for i in $(seq 1 30); do
            if docker exec wai-telegram-db pg_isready -U telegram -d telegram_ai > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL failed to start"
          exit 1
          EOF

      - name: Install backend dependencies
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          export PATH="/root/.local/bin:$PATH"
          cd /opt/wai-telegram/packages/backend
          uv sync
          EOF

      - name: Run database migrations
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          export PATH="/root/.local/bin:$PATH"
          cd /opt/wai-telegram/packages/backend
          set -a && source /opt/wai-telegram/.env.production && set +a
          uv run alembic upgrade head
          EOF

      - name: Build frontend
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          cd /opt/wai-telegram/packages/frontend
          npm ci
          npm run build
          EOF

      - name: Deploy systemd services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          cd /opt/wai-telegram
          cp systemd/wai-backend.service /etc/systemd/system/
          cp systemd/wai-celery.service /etc/systemd/system/
          cp systemd/wai-celery-beat.service /etc/systemd/system/
          cp systemd/wai-frontend.service /etc/systemd/system/
          systemctl daemon-reload
          EOF

      - name: Restart services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          systemctl restart wai-backend
          systemctl restart wai-celery wai-celery-beat wai-frontend

          # Reload nginx config
          cd /opt/wai-telegram
          cp nginx/telegram-ai.conf /etc/nginx/sites-available/
          ln -sf /etc/nginx/sites-available/telegram-ai.conf /etc/nginx/sites-enabled/
          nginx -t && systemctl reload nginx
          echo "All services restarted"
          EOF

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 10
            if curl -sf --max-time 10 https://telegram.waiwai.is/health; then
              echo ""
              echo "Deployment successful!"
              exit 0
            fi
            echo "Attempt $i/6 failed, retrying..."
          done
          echo "Health check failed after 6 attempts"
          exit 1
