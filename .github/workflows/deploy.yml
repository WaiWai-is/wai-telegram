name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes
  DEPLOY_DIR: /opt/wai-telegram

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint backend
        working-directory: packages/backend
        run: |
          uv sync --dev
          uv run ruff check .
          uv run ruff format --check .
      - name: Lint MCP server
        working-directory: packages/mcp-server
        run: |
          uv sync --dev
          uv run ruff check .
          uv run ruff format --check .

  typescript-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/frontend/package-lock.json
      - name: Install dependencies
        working-directory: packages/frontend
        run: npm ci
      - name: Lint
        working-directory: packages/frontend
        run: npx next lint
      - name: Type check
        working-directory: packages/frontend
        run: npx tsc --noEmit

  backend-tests:
    runs-on: ubuntu-latest
    needs: [python-lint]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: telegram
          POSTGRES_PASSWORD: telegram_test
          POSTGRES_DB: telegram_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://telegram:telegram_test@localhost:5432/telegram_ai_test
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: development
      SECRET_KEY: ci-test-secret-key
      ENCRYPTION_KEY: ZHVtbXktZW5jcnlwdGlvbi1rZXktZm9yLWNp
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: packages/backend
        run: uv sync --dev
      - name: Create pgvector extension
        run: |
          PGPASSWORD=telegram_test psql -h localhost -U telegram -d telegram_ai_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run migrations
        working-directory: packages/backend
        run: uv run alembic upgrade head
      - name: Run tests
        working-directory: packages/backend
        run: |
          uv run pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results/backend.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: packages/backend/test-results/

  frontend-tests:
    runs-on: ubuntu-latest
    needs: [typescript-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/frontend/package-lock.json
      - name: Install dependencies
        working-directory: packages/frontend
        run: npm ci
      - name: Run tests
        working-directory: packages/frontend
        run: npx vitest run --reporter=junit --outputFile=test-results/frontend.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: packages/frontend/test-results/

  mcp-tests:
    runs-on: ubuntu-latest
    needs: [python-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: packages/mcp-server
        run: uv sync --dev
      - name: Run tests
        working-directory: packages/mcp-server
        run: uv run pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, mcp-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Validate server environment
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          echo "Validating .env.production..."
          if [ ! -f /opt/wai-telegram/.env.production ]; then
            echo "FATAL: /opt/wai-telegram/.env.production not found"
            exit 1
          fi
          set -a && source /opt/wai-telegram/.env.production && set +a
          MISSING=""
          [ -z "${DATABASE_URL:-}" ] && MISSING="$MISSING DATABASE_URL"
          [ -z "${REDIS_URL:-}" ] && MISSING="$MISSING REDIS_URL"
          [ -z "${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-}" ] && MISSING="$MISSING NEXT_SERVER_ACTIONS_ENCRYPTION_KEY"
          [ -z "${SECRET_KEY:-}" ] && MISSING="$MISSING SECRET_KEY"
          if [ -n "$MISSING" ]; then
            echo "FATAL: Missing required env vars:$MISSING"
            exit 1
          fi
          echo "All required env vars present"
          EOF

      - name: Create service user and backup
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          # Create wai user if it doesn't exist
          if ! id wai &>/dev/null; then
            useradd --system --home-dir /home/wai --create-home --shell /bin/bash wai
            # Install uv for wai user
            su - wai -c 'curl -LsSf https://astral.sh/uv/install.sh | sh'
          fi

          # Backup current deployment for rollback
          if [ -d /opt/wai-telegram/packages ]; then
            mkdir -p /opt/wai-telegram-backups
            TS=$(date +%Y%m%d%H%M%S)
            TMP_BACKUP="/opt/wai-telegram-backups/${TS}.tmp"
            FINAL_BACKUP="/opt/wai-telegram-backups/${TS}"
            cp -a /opt/wai-telegram "${TMP_BACKUP}"
            mv "${TMP_BACKUP}" "${FINAL_BACKUP}"
            ln -sfn "${FINAL_BACKUP}" /opt/wai-telegram-backup
            echo "Backup created at ${FINAL_BACKUP}"
            # Keep only the 5 most recent backups
            ls -dt /opt/wai-telegram-backups/*/ 2>/dev/null | tail -n +6 | xargs rm -rf
          fi
          EOF

      - name: Sync code to server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.next' \
            --exclude '*.pyc' \
            --exclude 'code/' \
            --exclude '.DS_Store' \
            --exclude '.env.production' \
            --exclude '.env' \
            ./ ${USER}@${HOST}:${DEPLOY_DIR}/

      - name: Fix ownership
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          chown -R wai:wai /opt/wai-telegram
          # Ensure .env.production is readable by wai user (file is excluded from rsync)
          if [ -f /opt/wai-telegram/.env.production ]; then
            chown root:wai /opt/wai-telegram/.env.production
            chmod 640 /opt/wai-telegram/.env.production
          fi
          EOF

      - name: Start Docker services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          cd /opt/wai-telegram
          set -a && source .env.production && set +a
          docker-compose -f docker-compose.prod.yml up -d
          EOF

      - name: Wait for PostgreSQL
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          for i in $(seq 1 30); do
            if docker exec wai-telegram-db pg_isready -U telegram -d telegram_ai > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL failed to start"
          exit 1
          EOF

      - name: Install backend dependencies
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          export PATH="/home/wai/.local/bin:$PATH"
          cd /opt/wai-telegram/packages/backend
          su - wai -c 'cd /opt/wai-telegram/packages/backend && /home/wai/.local/bin/uv sync'
          EOF

      - name: Run database migrations
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          cd /opt/wai-telegram/packages/backend
          set -a && source /opt/wai-telegram/.env.production && set +a
          su - wai -c 'cd /opt/wai-telegram/packages/backend && set -a && source /opt/wai-telegram/.env.production && set +a && /home/wai/.local/bin/uv run alembic upgrade head'
          EOF

      - name: Build frontend
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          su - wai -c 'cd /opt/wai-telegram/packages/frontend && set -a && source /opt/wai-telegram/.env.production && set +a && npm ci --prefer-offline && npm run build'
          EOF

      - name: Deploy systemd services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          cd /opt/wai-telegram
          cp systemd/wai-backend.service /etc/systemd/system/
          cp systemd/wai-celery.service /etc/systemd/system/
          cp systemd/wai-celery-beat.service /etc/systemd/system/
          cp systemd/wai-frontend.service /etc/systemd/system/
          cp systemd/wai-listener.service /etc/systemd/system/
          systemctl daemon-reload
          EOF

      - name: Restart services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          systemctl restart wai-backend
          systemctl restart wai-celery wai-celery-beat wai-frontend wai-listener

          # Reload nginx config
          cd /opt/wai-telegram
          cp nginx/telegram-ai.conf /etc/nginx/sites-available/
          ln -sf /etc/nginx/sites-available/telegram-ai.conf /etc/nginx/sites-enabled/
          nginx -t && systemctl reload nginx
          echo "All services restarted"
          EOF

      - name: Verify service status
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $SSH_OPTS ${USER}@${HOST} << 'EOF'
          set -e
          # Wait for services to fully initialize (celery takes ~20s)
          sleep 20
          systemctl is-active --quiet wai-backend wai-celery wai-celery-beat wai-frontend wai-listener
          docker ps --format '{{.Names}}' | grep -q '^wai-telegram-db$'
          docker ps --format '{{.Names}}' | grep -q '^wai-telegram-redis$'
          cd /opt/wai-telegram/packages/backend
          /opt/wai-telegram/.venv/bin/celery -A app.tasks.celery_app:celery_app inspect ping --timeout=10 | grep -q pong
          curl -sf --max-time 10 http://127.0.0.1:8000/health/live > /dev/null
          curl -sf --max-time 10 http://127.0.0.1:8000/health/ready > /dev/null
          EOF

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 10
            if curl -sf --max-time 10 https://telegram.waiwai.is/health/ready; then
              echo ""
              echo "Deployment successful!"
              exit 0
            fi
            echo "Attempt $i/6 failed, retrying..."
          done
          echo "Health check failed after 6 attempts"
          exit 1
