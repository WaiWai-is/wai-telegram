[project]
name = "wai-telegram-backend"
version = "0.1.0"
description = "FastAPI backend for Telegram AI Message Manager"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    "PyJWT>=2.8.0",  # Replaced python-jose (CVE-2024-33663, CVE-2025-61152)
    "passlib[bcrypt]>=1.7.4",
    "bcrypt>=4.0.0,<4.1.0",  # Pin bcrypt for passlib compatibility
    "cryptography>=46.0.0",  # Updated from 44.0.0 for security fixes
    "telethon>=1.38.0",
    "celery[redis]>=5.4.0",
    "redis>=5.2.0",
    "openai>=1.58.0",
    "anthropic>=0.40.0",
    "pgvector>=0.3.0",
    "python-multipart>=0.0.18",
    "httpx>=0.28.0",
    "email-validator>=2.2.0",
    "slowapi>=0.1.9",  # Rate limiting
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
