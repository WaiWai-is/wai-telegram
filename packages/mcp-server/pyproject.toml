[project]
name = "telegram-ai-mcp"
version = "0.1.0"
description = "MCP Server for Telegram AI Message Manager"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.28.0",
    "pydantic>=2.10.0",
]

[project.scripts]
telegram-ai-mcp = "telegram_ai_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["telegram_ai_mcp"]
