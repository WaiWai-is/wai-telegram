[project]
name = "telegram-wai-mcp"
version = "0.2.0"
description = "MCP Server for Telegram AI Message Manager"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.25.0",
    "httpx>=0.28.0",
    "pydantic>=2.10.0",
    "uvicorn>=0.34.0",
    "starlette>=0.45.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.9.0",
]

[project.scripts]
telegram-wai-mcp = "telegram_wai_mcp.server:main"
telegram-wai-mcp-sse = "telegram_wai_mcp.sse_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["telegram_wai_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
